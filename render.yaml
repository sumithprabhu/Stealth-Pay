services:
  - type: web
    name: stealthpay-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: DEPLOYER_PRIVATE_KEY
        sync: false
      - key: RELAY_PRIVATE_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: PORT
        value: 4000
